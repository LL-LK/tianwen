[railway]
# Railway configuration for Tianwen-AGI
# https://docs.railway.app/reference/configuration

[build]
# Python build
builder = "python"

[deploy]
# Start command - reads PORT from environment
startCommand = "python runtime/server.py"
healthCheckPath = "/api/health"

[variables]
# Required environment variables
DEEPSEEK_API_KEY = { description = "DeepSeek API key for LLM inference" }
QWEN_ENDPOINT = { description = "Qwen API endpoint", default = "https://dashscope.aliyuncs.com/api/v1" }
PORT = { description = "Server port", default = "5000" }