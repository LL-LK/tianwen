version: '3.8'

# 天问-AGI 生产环境 Docker Compose 配置
# 使用方法: docker-compose up -d
#
# 环境变量:
#   OPENAI_API_KEY - OpenAI API Key (必需)
#   ANTHROPIC_API_KEY - Anthropic API Key (必需)
#   NEO4J_PASSWORD - Neo4j密码 (默认: password)
#   CHROMA_PERSIST_DIR - ChromaDB持久化目录 (默认: /data/chroma)

services:
  # Neo4j 图数据库
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"  # Neo4j Browser
      - "7687:7687"  # Bolt Protocol
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - tianwen-net

  # ChromaDB 向量数据库
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - tianwen-net

  # Redis 缓存 (可选，用于提升性能)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    networks:
      - tianwen-net

  # 天问-AGI 后端 API
  tianwen-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - TIANWEN_ENV=production
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - CHROMA_PERSIST_DIR=/data/chroma
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - tianwen-net

  # 天问-AGI Web 前端 (可选)
  # 如果使用Cloudflare Pages等托管前端，可以删除此服务
  tianwen-web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - tianwen-api
    restart: unless-stopped
    networks:
      - tianwen-net

volumes:
  neo4j_data:
  neo4j_logs:
  chroma_data:
  redis_data:

networks:
  tianwen-net:
    driver: bridge
