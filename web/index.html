<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天问-AGI 智能体</title>
    <meta name="description" content="天问-AGI 通用认知智能体 v2.2.0 - 智能体运行时，持续进化">
    <link rel="dns-prefetch" href="//tianwen-agi-production.up.railway.app">
    <link rel="preconnect" href="https://tianwen-agi-production.up.railway.app" crossorigin>
    <style>
        *,{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto}
        .header{text-align:center;color:#fff;margin-bottom:20px}
        .header h1{font-size:2.5em;margin-bottom:5px}
        .header p{opacity:.9}
        .engine-panel{background:rgba(255,255,255,.95);border-radius:12px;padding:20px;margin-bottom:20px;display:flex;justify-content:space-around;flex-wrap:wrap}
        .engine-item{text-align:center;padding:10px}
        .engine-icon{width:60px;height:60px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:8px}
        .engine-icon.active{background:#22c55e;color:#fff}
        .engine-icon.inactive{background:#e5e7eb;color:#9ca3af}
        .engine-icon.processing{background:#f59e0b;color:#fff;animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
        .chat-box{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;min-height:400px;max-height:500px;overflow-y:auto}
        .message{margin-bottom:16px;padding:12px 16px;border-radius:12px}
        .message.user{background:#3b82f6;color:#fff;margin-left:40px}
        .message.bot{background:#f3f4f6;color:#1f2937;margin-right:40px}
        .message .role{font-weight:700;margin-bottom:4px}
        .message pre{background:#1f2937;color:#e5e7eb;padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0;font-size:13px}
        .cognitive-info{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px;margin:8px 0;font-size:13px}
        .cognitive-info h4{color:#1e40af;margin-bottom:8px}
        .cognitive-info .tag{display:inline-block;background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:4px;margin:2px;font-size:12px}
        .input-area{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
        .input-area input{flex:1;min-width:200px;padding:14px 18px;border:none;border-radius:25px;font-size:16px;outline:none}
        .input-area button{padding:14px 24px;border:none;border-radius:25px;font-size:16px;cursor:pointer;transition:transform .2s}
        .input-area button:hover{transform:scale(1.05)}
        .input-area .send-btn{background:#3b82f6;color:#fff}
        .input-area .clear-btn{background:#e5e7eb;color:#4b5563}
        .quick-actions{background:#fff;border-radius:12px;padding:16px}
        .quick-actions h3{margin-bottom:12px;color:#4b5563}
        .quick-actions .btn-group{display:flex;flex-wrap:wrap;gap:8px}
        .quick-actions button{padding:10px 16px;border:1px solid #e5e7eb;background:#fff;border-radius:20px;cursor:pointer;transition:all .2s}
        .quick-actions button:hover{background:#3b82f6;color:#fff;border-color:#3b82f6}
        .processing-indicator{display:none;text-align:center;padding:20px}
        .spinner{width:40px;height:40px;border:4px solid #e5e7eb;border-top-color:#3b82f6;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .error-msg{color:#ef4444;background:#fee2e2;padding:8px 12px;border-radius:8px;margin:8px 0}
        @media(max-width:600px){.header h1{font-size:1.8em}.message.user,.message.bot{margin-left:0;margin-right:0}.engine-item{padding:5px}.engine-icon{width:50px;height:50px;font-size:20px}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>天问-AGI</h1>
            <p>通用认知智能体 v2.2.0 | Agent Runtime | 持续进化</p>
        </div>
        <div class="engine-panel">
            <div class="engine-item"><div class="engine-icon active" id="cognitiveIcon">C</div><div>认知引擎</div></div>
            <div class="engine-item"><div class="engine-icon active" id="planningIcon">P</div><div>规划引擎</div></div>
            <div class="engine-item"><div class="engine-icon active" id="executionIcon">E</div><div>执行引擎</div></div>
            <div class="engine-item"><div class="engine-icon active" id="evolutionIcon">V</div><div>进化系统</div></div>
        </div>
        <div class="chat-box" id="chatBox"><div class="message bot"><div class="role">天问-AGI</div><div>你好！我是天问-AGI v2.2.0，一个带有实际运行时的通用认知智能体。请输入你的需求，或点击下方快捷按钮体验！</div></div></div>
        <div class="processing-indicator" id="processing"><div class="spinner"></div><div>智能体思考中...</div></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入你的需求..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button class="send-btn" onclick="sendMessage()">发送</button>
            <button class="clear-btn" onclick="clearChat()">清除</button>
        </div>
        <div class="quick-actions">
            <h3>快捷测试用例</h3>
            <div class="btn-group">
                <button onclick="quickTest(0)">代码生成</button>
                <button onclick="quickTest(1)">架构设计</button>
                <button onclick="quickTest(2)">后端开发</button>
                <button onclick="quickTest(3)">安全审查</button>
                <button onclick="quickTest(4)">数据分析</button>
            </div>
        </div>
    </div>
<script>const API_BASE='https://tianwen-agi-production.up.railway.app/api',qT=['写一个JavaScript快速排序算法','设计一个高并发的秒杀系统架构','创建一个用户管理的REST API','检查这段登录代码的安全性：直接拼接SQL和明文密码比较','分析这份销售数据：1月100万，2月80万，3月120万，4月90万'];let sId=null,proc=false;function quickTest(t){document.getElementById('userInput').value=qT[t];sendMessage()}function setProc(e){['cognitiveIcon','planningIcon','executionIcon','evolutionIcon'].forEach(id=>{const i=document.getElementById(id);i.className='engine-icon '+(e?'processing':'active')})}
async function sendMessage(){if(proc)return;const i=document.getElementById('userInput'),m=i.value.trim();if(!m)return;const c=document.getElementById('chatBox'),p=document.getElementById('processing');c.innerHTML+=`<div class="message user"><div class="role">你</div><div>${escHtml(m)}</div></div>`;i.value='';p.style.display='block';setProc(true);proc=true;c.scrollTop=c.scrollHeight;try{const r=await fetch(API_BASE+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:m,session_id:sId})}),d=await r.json();if(d.error)throw new Error(d.error);sId=d.session_id;let h='';if(d.cognitive)h=`<div class="cognitive-info"><h4>认知分析</h4><div>意图: <span class="tag">${d.cognitive.intent}</span></div><div>技能: ${d.cognitive.skills.map(s=>`<span class="tag">${s}</span>`).join('')}</div><div>复杂度: <span class="tag">${d.cognitive.complexity}</span></div></div>`;let ph='';if(d.plan&&d.plan.subtasks){const rows=d.plan.subtasks.map(t=>`<tr><td>${t.id}</td><td>${t.skill}</td><td>${t.status==='completed'?'✅':t.status==='failed'?'❌':'⏳'} ${t.status}</td></tr>`).join('');ph=`<div class="cognitive-info" style="background:#f0fdf4;border-color:#bbf7d0;"><h4>执行计划</h4><table style="width:100%;font-size:12px;"><tr><th>ID</th><th>技能</th><th>状态</th></tr>${rows}</table><div style="margin-top:8px;">预估时间: ${d.plan.estimated_time||'N/A'}</div></div>`}c.innerHTML+=`<div class="message bot"><div class="role">天问-AGI</div>${h}${ph}<pre>${escHtml(d.output||JSON.stringify(d,null,2))}</pre></div>`}catch(e){c.innerHTML+=`<div class="message bot"><div class="role">天问-AGI</div><div class="error-msg">请求失败: ${e.message}</div></div>`}finally{p.style.display='none';setProc(false);proc=false;c.scrollTop=c.scrollHeight}}
function escHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function clearChat(){document.getElementById('chatBox').innerHTML=`<div class="message bot"><div class="role">天问-AGI</div><div>对话已清除！请输入新的需求。</div></div>`;sId=null}
window.onload=async()=>{try{const r=await fetch(API_BASE+'/health');if(!r.ok)throw new Error()}catch(e){console.log('Backend not connected')}};
</script></body></html>
