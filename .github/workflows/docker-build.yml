name: Build and Push to Registry

on:
  push:
    branches: [main, trae]

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract metadata (tags, date, etc.)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Compose image reference
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="ghcr.io/${{ github.repository }}:${SHA_SHORT}"
          if grep -q "image: tianwen-agi:latest" docker-compose.yml; then
            sed -i "s|image: tianwen-agi:latest|image: ${IMAGE_TAG}|" docker-compose.yml
          elif grep -q "image: ghcr.io/" docker-compose.yml; then
            sed -i "s|image: ghcr.io/.*|image: ${IMAGE_TAG}|" docker-compose.yml
          fi
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add docker-compose.yml
            git commit -m "chore: update docker-compose image to ${IMAGE_TAG}"
            git push origin ${{ github.ref_name }}
          fi