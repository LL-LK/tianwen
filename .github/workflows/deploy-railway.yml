name: Deploy to Railway

on:
  push:
    branches: [main, trae]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          sudo docker image prune -af || true
          sudo apt-get clean || true
          df -h

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link --environment production || true
          railway up --service server --detach || true

      - name: Health check
        run: |
          sleep 30
          curl -f -s -o /dev/null -w "%{http_code}" "https://${{ secrets.RAILWAY_APP_URL }}/api/health" || echo "Health check failed (may need warmup)"

      - name: Create deployment summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Ref**: \`${{ github.ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL**: https://${{ secrets.RAILWAY_APP_URL }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Health**: https://${{ secrets.RAILWAY_APP_URL }}/api/health" >> "$GITHUB_STEP_SUMMARY"