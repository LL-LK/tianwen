name: Deploy to Railway

on:
  push:
    branches: [main, trae]
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli

      - name: Build and push Docker image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin "$DOCKER_REGISTRY"
          docker build -t $DOCKER_REGISTRY/tianwen-agi:${{ github.sha }} .
          docker push $DOCKER_REGISTRY/tianwen-agi:${{ github.sha }}

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway login --token $RAILWAY_TOKEN
          railway link --environment production || true
          railway up --service server --detach || echo "server service may not exist yet"
          railway up --service vector-db --detach || echo "vector-db service may not exist yet"

      - name: Health check
        if: env.RAILWAY_APP_URL != ''
        run: |
          sleep 30
          curl -f "https://${{ secrets.RAILWAY_APP_URL }}/api/health" || exit 1

      - name: Create deployment summary
        if: always()
        run: |
          {
            echo "## Deployment Summary"
            echo "- Commit: ${{ github.sha }}"
            echo "- Ref: ${{ github.ref }}"
            echo "- URL: https://${{ secrets.RAILWAY_APP_URL }}"
          } >> $GITHUB_STEP_SUMMARY