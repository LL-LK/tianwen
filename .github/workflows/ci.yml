name: CI Pipeline

on:
  push:
    branches: [main, trae]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -q flake8 black mypy

      - name: Lint with flake8
        run: |
          flake8 runtime/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Format check with black
        run: |
          black --check runtime/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r runtime/requirements.txt

      - name: Run syntax check
        run: |
          python -m py_compile runtime/*.py

      - name: Run unit tests
        run: |
          cd runtime
          python -m pytest tests/test_runtime_modules.py -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t tianwen-agi:${{ github.sha }} .
          docker build -t tianwen-agi:latest .

      - name: Run container health check
        run: |
          docker run -d --name test-app -p 5000:5000 tianwen-agi:latest
          sleep 15
          docker logs test-app
          docker stop test-app || true
          docker rm test-app || true