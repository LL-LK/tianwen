name: CI Pipeline

on:
  push:
    branches: [main, trae]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -q flake8 black

      - name: Lint with flake8
        run: |
          flake8 runtime/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Format check with black
        run: |
          black --check --diff runtime/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r runtime/requirements.txt

      - name: Run syntax check
        run: |
          find runtime/ -name "*.py" -exec python -m py_compile {} \;

      - name: Run unit tests
        run: |
          python -m pytest runtime/tests/test_runtime_modules.py -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: |
          docker build -t tianwen-agi:${{ github.sha }} .
          docker tag tianwen-agi:${{ github.sha }} tianwen-agi:latest

      - name: Run container health check
        run: |
          docker run -d --name test-app -p 5000:5000 tianwen-agi:latest
          sleep 15
          docker logs test-app
          docker stop test-app || true
          docker rm test-app || true