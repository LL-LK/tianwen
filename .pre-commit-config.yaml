# 天问-AGI Pre-commit Hooks配置
# Issue #72 - 代码质量门禁
#
# 使用方法:
#   pip install pre-commit
#   pre-commit install
#   pre-commit run --all-files
#
# 或使用Docker:
#   docker run -v $(pwd):/repo ghcr.io/pre-commit/action:latest

repos:
  # ============ 基础检查 ============
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # 检查YAML格式
      - id: check-yaml
        args: [--allow-multiple-documents]

      # 检查JSON格式
      - id: check-json

      # 检查合并冲突标记
      - id: check-merge-conflict

      # 检查Python AST
      - id: check-ast

      # 检查XML格式
      - id: check-xml

      # 文件末尾换行
      - id: end-of-file-fixer

      # 删除尾随空白
      - id: trailing-whitespace
        args: [--markdown-line-length=200]

      # 检查添加了大文件
      - id: check-added-large-files
        args: ['--maxkb=5000']

      # 检查git不区分大小写冲突
      - id: check-case-conflict

      # 检查私有钥匙
      - id: check-secret
        exclude: \.env\.

  # ============ 代码格式化 - Black ============
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        name: black
        description: 代码格式化
        entry: black
        language_version: python3
        args:
          - --line-length=120
          - --target-version=py39
          - --exclude=_version.py
          - --exclude=\.venv/
          - --exclude=migrations/
        types: [python]

  # ============ 导入排序 - isort ============
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort
        description: 导入排序
        entry: isort
        language_version: python3
        args:
          - --profile=black
          - --line-length=120
          - --skip=.venv
          - --skip=migrations
          - --skip-glob=*_version.py
        types: [python]

  # ============ 代码检查 - Flake8 ============
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: flake8
        description: Python代码检查
        entry: flake8
        language_version: python3
        args:
          - --max-line-length=120
          - --extend-ignore=E203,W503
          - --exclude=.venv
          - --exclude=migrations
          - --per-file-ignores=
            __init__.py:F401,F403
            tests/*:F401,F811
        types: [python]

  # ============ 安全扫描 - Bandit ============
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        name: bandit
        description: 安全扫描
        entry: bandit
        language_version: python3
        args:
          - --exclude=.venv
          - --exclude=migrations
          - --recursive
          - --ini=.bandit
        types: [python]

  # ============ 类型检查 - MyPy ============
  - repo: https://github.com/pre-commit/mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: mypy
        description: 类型检查
        entry: mypy
        language_version: python3
        additional_dependencies:
          - types-redis
          - types-requests
          - types-PyYAML
          - types-jsonschema
        args:
          - --ignore-missing-imports
          - --warn-unused-ignores
          - --check-untyped-defs
          - --pretty
          - --exclude=.venv
          - --exclude=migrations
        types: [python]

  # ============ Shell脚本检查 ============
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        name: shellcheck
        description: Shell脚本检查
        types: [shell]
        args: [--exclude=SC1090,SC1091]

  # ============ Markdown检查 ============
  - repo: https://github.com/executablebooks/mdlefmt
    rev: v0.3.1
    hooks:
      - id: mdformat
        name: mdformat
        description: Markdown格式化
        types: [markdown]

  # ============ Dockerfile检查 ============
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint
        name: hadolint
        description: Dockerfile检查
        files: Dockerfile
        args: [--ignore=DL3041,DL3059]

  # ============ YAML格式检查 ============
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: prettier
        description: YAML/JSON格式化
        entry: prettier --write
        files: \.(ya?ml|json)$
        types: [yaml, json]

# ============ 本地钩子 ============
# 可以在项目根目录创建 .pre-commit-hooks.yaml 定义本地钩子
