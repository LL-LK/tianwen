[pytest]
testpaths = tests/test_frontend
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
norecursedirs = .git .tox dist build *.egg __pycache__ .pytest_cache

# Test options
addopts = -v --tb=short

# Logging
log_cli = false
log_cli_level = INFO

# Playwright configuration
# Install: pip install pytest-playwright
# Then: playwright install chromium
playwright_timeout = 30000
playwright_slowmo = 100

# Custom markers
markers =
    playwright: Playwright-based UI tests
    ui: User interface tests
    slow: Tests that take longer to run
