[pytest]
testpaths = tests/test_frontend
pythonpath = .
norecursedirs = .git .tox dist build *.egg __pycache__ .pytest_cache

# Test options
addopts = -v --tb=short

# Logging
log_cli = false
log_cli_level = INFO

# Playwright configuration
playwright_timeout = 30000

# Custom markers
markers =
    playwright: Playwright-based UI tests
    ui: User interface tests
    slow: Tests that take longer to run
